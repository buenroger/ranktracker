# =============================================================================
# Rank Tracker — Nginx
# Sustituye TU_DOMINIO.COM por tu dominio real (ej: ranktracker.tudominio.com)
# =============================================================================

server {
    listen 80;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # Redirigir todo HTTP → HTTPS (descomentar tras instalar el certificado SSL)
    # return 301 https://$host$request_uri;

    # --- API FastAPI ---
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Logs
    access_log /var/log/nginx/ranktracker-access.log;
    error_log  /var/log/nginx/ranktracker-error.log;
}

